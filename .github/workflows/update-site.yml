name: Update THS fund flow site

on:
  workflow_dispatch:
  schedule:
    - cron: "35 8 * * 1-5"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate latest THS fund flow data
        run: node scripts/update_data.mjs

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update THS fund flow data"
          file_pattern: data/site-data.json
